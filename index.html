<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LowLevelEngineers</title>

<style>

body{
  font-family: monospace;
  background:#0f172a;
  color:#e2e8f0;
  padding:40px;
}

h1{
  font-size:32px;
}

.card{
  padding:12px;
  border:1px solid #334155;
  margin:10px 0;
  border-radius:8px;
}

a{
  color:#38bdf8;
  text-decoration:none;
}

</style>

</head>

<body>

<h1>Low Level Engineers</h1>

<h2>Services</h2>

<div id="services"></div>

<script>

async function load(){

  const res = await fetch("https://api.lowlevelengineers.com")

  const services = await res.json()

  const container = document.getElementById("services")

  services.forEach(s => {

    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `<a href="${s.url}">${s.name}</a>`

    container.appendChild(div)

  })

}

load()

</script>

</body>
</html>
